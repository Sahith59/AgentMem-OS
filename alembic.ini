# Alembic Configuration — AgentMem OS
# Run migrations with: alembic upgrade head
# Create a new migration: alembic revision --autogenerate -m "description"

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# DB URL is set dynamically in env.py from engine.py (not hardcoded here)
sqlalchemy.url = sqlite:///%(here)s/.memnai_alembic.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
